<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
overflow:hidden;
padding:20px;
}

.bg-blur{
position:absolute;
width:400px;
height:400px;
background:#6366f1;
filter:blur(120px);
opacity:.15;
border-radius:50%;
top:-100px;
left:-100px;
}

.bg-blur2{
position:absolute;
width:350px;
height:350px;
background:#8b5cf6;
filter:blur(120px);
opacity:.12;
border-radius:50%;
bottom:-120px;
right:-100px;
}

.card{
position:relative;
width:100%;
max-width:400px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.6);
padding:40px 30px;
border-radius:28px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
z-index:2;
}

.logo{
width:70px;
height:70px;
border-radius:20px;
background:linear-gradient(135deg,#4f46e5,#7c3aed);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:22px;
color:#fff;
font-size:28px;
box-shadow:0 10px 25px rgba(79,70,229,.25);
}

.card h1{
font-size:30px;
font-weight:700;
text-align:center;
color:#111827;
margin-bottom:10px;
}

.card p{
text-align:center;
font-size:15px;
line-height:1.7;
color:#6b7280;
margin-bottom:28px;
}

.google-btn{
width:100%;
height:56px;
border:none;
border-radius:16px;
background:#111827;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
cursor:pointer;
font-size:15px;
font-weight:600;
transition:.25s;
position:relative;
overflow:hidden;
}

.google-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(17,24,39,.15);
}

.google-btn:disabled{
opacity:.7;
cursor:not-allowed;
}

.google-icon{
width:20px;
height:20px;
background:#fff;
padding:2px;
border-radius:50%;
}

.error-box{
margin-top:18px;
padding:14px;
border-radius:14px;
background:#fef2f2;
border:1px solid #fecaca;
color:#dc2626;
font-size:14px;
display:none;
animation:fade .2s ease;
}

.success-box{
margin-top:18px;
padding:14px;
border-radius:14px;
background:#ecfdf5;
border:1px solid #a7f3d0;
color:#059669;
font-size:14px;
display:none;
animation:fade .2s ease;
}

.features{
margin-top:28px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.feature{
background:#f9fafb;
padding:14px;
border-radius:14px;
font-size:13px;
color:#374151;
display:flex;
align-items:center;
gap:10px;
border:1px solid #f3f4f6;
}

.feature i{
color:#4f46e5;
}

.spinner{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,.4);
border-top:2px solid #fff;
border-radius:50%;
animation:spin .7s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(5px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:500px){

.card{
padding:32px 22px;
border-radius:24px;
}

.card h1{
font-size:26px;
}

.features{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="bg-blur"></div>
<div class="bg-blur2"></div>

<div class="card">

<div class="logo">
<i class="fa-solid fa-futbol"></i>
</div>

<h1>Welcome Back</h1>

<p>
Continue with your Google account to join live football discussions,
replies, reactions and match debates.
</p>

<button class="google-btn" id="loginBtn">

<img
class="google-icon"
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
>

<span id="btnText">
Continue with Google
</span>

</button>

<div class="error-box" id="errorBox"></div>

<div class="success-box" id="successBox"></div>

<div class="features">

<div class="feature">
<i class="fa-solid fa-comments"></i>
Live Discussions
</div>

<div class="feature">
<i class="fa-solid fa-thumbs-up"></i>
Likes & Replies
</div>

<div class="feature">
<i class="fa-solid fa-user-shield"></i>
Secure Login
</div>

<div class="feature">
<i class="fa-solid fa-bolt"></i>
Realtime Updates
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC9tqDdyuIbdgWIBcwwGB7uax0ci_AlrSE",
authDomain: "discussions-636e5.firebaseapp.com",
databaseURL: "https://discussions-636e5-default-rtdb.firebaseio.com",
projectId: "discussions-636e5",
storageBucket: "discussions-636e5.firebasestorage.app",
messagingSenderId: "3981476762",
appId: "1:3981476762:web:b3cb0f505367758a52b023",
measurementId: "G-FB1S4XN3GS"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

const provider = new firebase.auth.GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const btnText = document.getElementById("btnText");

const errorBox = document.getElementById("errorBox");
const successBox = document.getElementById("successBox");

function showError(message){

errorBox.style.display = "block";
errorBox.innerText = message;

successBox.style.display = "none";

}

function showSuccess(message){

successBox.style.display = "block";
successBox.innerText = message;

errorBox.style.display = "none";

}

function setLoading(state){

if(state){

loginBtn.disabled = true;

btnText.innerHTML = `<div class="spinner"></div>`;

}else{

loginBtn.disabled = false;

btnText.innerHTML = `Continue with Google`;

}

}

loginBtn.addEventListener("click", async ()=>{

errorBox.style.display = "none";
successBox.style.display = "none";

setLoading(true);

try{

const result = await auth.signInWithPopup(provider);

const user = result.user;

await db.ref("users/" + user.uid).set({

name:user.displayName || "",
email:user.email || "",
photoURL:user.photoURL || "",
uid:user.uid,
lastLogin:Date.now()

});

showSuccess("Login successful. Redirecting...");

setTimeout(()=>{

window.location.href = "home.html";

},1000);

}catch(error){

console.error(error);

let message = "Login failed. Please try again.";

if(error.code === "auth/popup-closed-by-user"){

message = "Popup closed before sign in completed.";

}else if(error.code === "auth/network-request-failed"){

message = "Network error. Check your internet connection.";

}else if(error.code === "auth/cancelled-popup-request"){

message = "Another popup request is already running.";

}

showError(message);

setLoading(false);

}

});

auth.onAuthStateChanged(user=>{

if(user){

window.location.href = "home.html";

}

});

</script>

</body>
</html>
