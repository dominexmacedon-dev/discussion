<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Football Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
overflow-x:hidden;
padding:20px;
}

.bg-blur{
position:absolute;
width:400px;
height:400px;
background:#6366f1;
filter:blur(120px);
opacity:.15;
border-radius:50%;
top:-100px;
left:-100px;
}

.bg-blur2{
position:absolute;
width:350px;
height:350px;
background:#8b5cf6;
filter:blur(120px);
opacity:.12;
border-radius:50%;
bottom:-120px;
right:-100px;
}

.card{
position:relative;
width:100%;
max-width:460px;
background:rgba(255,255,255,.92);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.6);
padding:40px 30px;
border-radius:30px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
z-index:2;
}

.logo{
width:78px;
height:78px;
border-radius:22px;
background:linear-gradient(135deg,#4f46e5,#7c3aed);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:24px;
color:#fff;
font-size:32px;
box-shadow:0 10px 25px rgba(79,70,229,.25);
}

.card h1{
font-size:32px;
font-weight:700;
text-align:center;
color:#111827;
margin-bottom:10px;
}

.card p{
text-align:center;
font-size:15px;
line-height:1.7;
color:#6b7280;
margin-bottom:24px;
}

.select-label{
font-size:14px;
font-weight:600;
margin-bottom:10px;
display:block;
color:#111827;
}

.team-select{
width:100%;
padding:15px;
border-radius:16px;
border:1px solid #e5e7eb;
outline:none;
font-size:15px;
background:#fff;
margin-bottom:20px;
transition:.2s;
}

.team-select:focus{
border-color:#4f46e5;
box-shadow:0 0 0 4px rgba(79,70,229,.1);
}

.team-option{
display:flex;
align-items:center;
gap:10px;
}

.google-btn{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
cursor:pointer;
font-size:15px;
font-weight:600;
transition:.25s;
}

.google-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(17,24,39,.15);
}

.google-btn:disabled{
opacity:.7;
cursor:not-allowed;
}

.google-icon{
width:20px;
height:20px;
background:#fff;
padding:2px;
border-radius:50%;
}

.error-box{
margin-top:18px;
padding:14px;
border-radius:14px;
background:#fef2f2;
border:1px solid #fecaca;
color:#dc2626;
font-size:14px;
display:none;
}

.success-box{
margin-top:18px;
padding:14px;
border-radius:14px;
background:#ecfdf5;
border:1px solid #a7f3d0;
color:#059669;
font-size:14px;
display:none;
}

.features{
margin-top:28px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.feature{
background:#f9fafb;
padding:14px;
border-radius:14px;
font-size:13px;
color:#374151;
display:flex;
align-items:center;
gap:10px;
border:1px solid #f3f4f6;
}

.feature i{
color:#4f46e5;
}

.spinner{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,.4);
border-top:2px solid #fff;
border-radius:50%;
animation:spin .7s linear infinite;
}

.team-logo{
width:18px;
height:18px;
object-fit:contain;
vertical-align:middle;
margin-right:8px;
}

.loading-teams{
padding:15px;
text-align:center;
color:#6b7280;
font-size:14px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@media(max-width:500px){

.card{
padding:30px 22px;
}

.features{
grid-template-columns:1fr;
}

.card h1{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="bg-blur"></div>
<div class="bg-blur2"></div>

<div class="card">

<div class="logo">
<i class="fa-solid fa-futbol"></i>
</div>

<h1>Football Hub</h1>

<p>
Choose your favorite club and continue with Google to join live football discussions and debates.
</p>

<label class="select-label">
Choose Your Team
</label>

<select class="team-select" id="teamSelect">
<option value="">Loading teams...</option>
</select>

<button class="google-btn" id="loginBtn">

<img
class="google-icon"
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
>

<span id="btnText">
Continue with Google
</span>

</button>

<div class="error-box" id="errorBox"></div>

<div class="success-box" id="successBox"></div>

<div class="features">

<div class="feature">
<i class="fa-solid fa-comments"></i>
Live Discussions
</div>

<div class="feature">
<i class="fa-solid fa-thumbs-up"></i>
Likes & Replies
</div>

<div class="feature">
<i class="fa-solid fa-user-shield"></i>
Secure Login
</div>

<div class="feature">
<i class="fa-solid fa-bolt"></i>
Realtime Updates
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC9tqDdyuIbdgWIBcwwGB7uax0ci_AlrSE",
authDomain: "discussions-636e5.firebaseapp.com",
databaseURL: "https://discussions-636e5-default-rtdb.firebaseio.com",
projectId: "discussions-636e5",
storageBucket: "discussions-636e5.firebasestorage.app",
messagingSenderId: "3981476762",
appId: "1:3981476762:web:b3cb0f505367758a52b023",
measurementId: "G-FB1S4XN3GS"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

const provider = new firebase.auth.GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const btnText = document.getElementById("btnText");
const teamSelect = document.getElementById("teamSelect");

const errorBox = document.getElementById("errorBox");
const successBox = document.getElementById("successBox");

function showError(message){

errorBox.style.display = "block";
errorBox.innerText = message;

successBox.style.display = "none";

}

function showSuccess(message){

successBox.style.display = "block";
successBox.innerText = message;

errorBox.style.display = "none";

}

function setLoading(state){

if(state){

loginBtn.disabled = true;

btnText.innerHTML = `<div class="spinner"></div>`;

}else{

loginBtn.disabled = false;

btnText.innerHTML = `Continue with Google`;

}

}

async function loadTeams(){

try{

const response = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/search_all_teams.php?l=English%20Premier%20League"
);

const premierLeague = await response.json();

const response2 = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/search_all_teams.php?l=Spanish%20La%20Liga"
);

const laLiga = await response2.json();

const response3 = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/search_all_teams.php?l=Italian%20Serie%20A"
);

const serieA = await response3.json();

const response4 = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/search_all_teams.php?l=French%20Ligue%201"
);

const ligue1 = await response4.json();

const response5 = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/search_all_teams.php?l=German%20Bundesliga"
);

const bundesliga = await response5.json();

teamSelect.innerHTML = `
<option value="">Select Your Club</option>
`;

const leagues = [

{
name:"Premier League",
teams:premierLeague.teams || []
},

{
name:"La Liga",
teams:laLiga.teams || []
},

{
name:"Serie A",
teams:serieA.teams || []
},

{
name:"Ligue 1",
teams:ligue1.teams || []
},

{
name:"Bundesliga",
teams:bundesliga.teams || []
}

];

leagues.forEach(league=>{

const group = document.createElement("optgroup");

group.label = league.name;

league.teams.forEach(team=>{

const option = document.createElement("option");

option.value = team.strTeam;

option.textContent = team.strTeam;

option.setAttribute("data-logo", team.strBadge || "");

group.appendChild(option);

});

teamSelect.appendChild(group);

});

}catch(error){

console.error(error);

showError("Failed to load football clubs.");

teamSelect.innerHTML = `
<option value="">Failed to load clubs</option>
`;

}

}

loadTeams();

loginBtn.addEventListener("click", async ()=>{

const selectedTeam = teamSelect.value;

if(!selectedTeam){

showError("Please choose your favorite club.");

return;

}

errorBox.style.display = "none";
successBox.style.display = "none";

setLoading(true);

try{

const selectedOption =
teamSelect.options[teamSelect.selectedIndex];

const teamLogo =
selectedOption.getAttribute("data-logo") || "";

const result = await auth.signInWithPopup(provider);

const user = result.user;

await db.ref("users-register/" + user.uid).set({

name:user.displayName || "",
email:user.email || "",
photoURL:user.photoURL || "",
uid:user.uid,
favoriteTeam:selectedTeam,
favoriteTeamLogo:teamLogo,
lastLogin:Date.now()

});

showSuccess("Login successful. Redirecting...");

setTimeout(()=>{

window.location.href = "home.html";

},1000);

}catch(error){

console.error(error);

let message = "Login failed. Please try again.";

if(error.code === "auth/popup-closed-by-user"){

message = "Popup closed before sign in completed.";

}else if(error.code === "auth/network-request-failed"){

message = "Network error. Check your internet connection.";

}else if(error.code === "auth/cancelled-popup-request"){

message = "Another popup request is already running.";

}

showError(message);

setLoading(false);

}

});

auth.onAuthStateChanged(user=>{

if(user){

window.location.href = "home.html";

}

});

</script>

</body>
</html>
