margin-bottom:20px;

.team-select:focus{

}

.google-btn{

color:#fff;

align-items:center;

.google-btn:hover{
transform:translateY(-2px);

}

.google-btn:disabled{
opacity:.7;
cursor:not-allowed;
}

.google-icon{
width:20px;
height:20px;
background:#fff;
padding:2px;
border-radius:50%;
}

.error-box{
margin-top:18px;
padding:14px;
border-radius:14px;
background:#fef2f2;
border:1px solid #fecaca;
color:#dc2626;
font-size:14px;
display:none;
}

.success-box{
margin-top:18px;
padding:14px;
border-radius:14px;
background:#ecfdf5;
border:1px solid #a7f3d0;
color:#059669;
font-size:14px;
display:none;
}

.features{
margin-top:28px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.feature{
background:#f9fafb;
padding:14px;
border-radius:14px;
font-size:13px;
color:#374151;
display:flex;
align-items:center;
gap:10px;
border:1px solid #f3f4f6;
}

.feature i{
color:#4f46e5;
}

.spinner{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,.4);
border-top:2px solid #fff;
border-radius:50%;
animation:spin .7s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@media(max-width:500px){

.card{
padding:30px 22px;
}

.features{
grid-template-columns:1fr;
}

.card h1{
font-size:28px;
}

}

<script>

const firebaseConfig = {
apiKey: "AIzaSyC9tqDdyuIbdgWIBcwwGB7uax0ci_AlrSE",
authDomain: "discussions-636e5.firebaseapp.com",
databaseURL: "https://discussions-636e5-default-rtdb.firebaseio.com",
projectId: "discussions-636e5",
storageBucket: "discussions-636e5.firebasestorage.app",
messagingSenderId: "3981476762",
appId: "1:3981476762:web:b3cb0f505367758a52b023",
measurementId: "G-FB1S4XN3GS"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

const provider = new firebase.auth.GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const btnText = document.getElementById("btnText");
const teamSelect = document.getElementById("teamSelect");

const errorBox = document.getElementById("errorBox");
const successBox = document.getElementById("successBox");

function showError(message){

errorBox.style.display = "block";
errorBox.innerText = message;

successBox.style.display = "none";

}

function showSuccess(message){

successBox.style.display = "block";
successBox.innerText = message;

errorBox.style.display = "none";

}

function setLoading(state){

if(state){

loginBtn.disabled = true;

btnText.innerHTML = `<div class="spinner"></div>`;

}else{

loginBtn.disabled = false;

btnText.innerHTML = `Continue with Google`;

}

}

loginBtn.addEventListener("click", async ()=>{

const selectedTeam = teamSelect.value;

if(!selectedTeam){

showError("Please choose your favorite club.");

return;

}

errorBox.style.display = "none";
successBox.style.display = "none";

setLoading(true);

try{

const result = await auth.signInWithPopup(provider);

const user = result.user;

await db.ref("users-register/" + user.uid).set({

name:user.displayName || "",
email:user.email || "",
photoURL:user.photoURL || "",
uid:user.uid,
favoriteTeam:selectedTeam,
lastLogin:Date.now()

});

showSuccess("Login successful. Redirecting...");

setTimeout(()=>{

window.location.href = "home.html";

},1000);

}catch(error){

console.error(error);

let message = "Login failed. Please try again.";

if(error.code === "auth/popup-closed-by-user"){

message = "Popup closed before sign in completed.";

}else if(error.code === "auth/network-request-failed"){

message = "Network error. Check your internet connection.";

}else if(error.code === "auth/cancelled-popup-request"){

message = "Another popup request is already running.";

}

showError(message);

setLoading(false);

}

});

auth.onAuthStateChanged(user=>{

if(user){

window.location.href = "home.html";

}

});

</script>
