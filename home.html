<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#fff;
border-radius:24px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
text-align:center;
}

.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid #4f46e5;
margin:0 auto 20px auto;
background:#f3f4f6;
}

h2{
font-size:24px;
margin-bottom:6px;
color:#111827;
}

p{
font-size:14px;
color:#6b7280;
margin-bottom:10px;
word-break:break-word;
}

.label{
font-size:12px;
color:#9ca3af;
margin-top:14px;
text-transform:uppercase;
letter-spacing:.5px;
}

.value{
font-size:15px;
font-weight:600;
color:#111827;
margin-top:4px;
}

.club{
margin-top:18px;
padding:10px 14px;
background:#eef2ff;
border-radius:12px;
display:inline-block;
font-weight:600;
color:#4f46e5;
}

.logout-btn{
margin-top:25px;
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#111827;
color:#fff;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.logout-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.loading{
font-size:14px;
color:#6b7280;
}

</style>
</head>

<body>

<div class="card">

<img id="profilePic" class="profile" src="https://via.placeholder.com/150" />

<h2 id="name">Loading...</h2>

<p id="email">Loading...</p>

<div class="label">Favorite Club</div>
<div class="club" id="club">---</div>

<button class="logout-btn" id="logoutBtn">Logout</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyC9tqDdyuIbdgWIBcwwGB7uax0ci_AlrSE",
authDomain: "discussions-636e5.firebaseapp.com",
databaseURL: "https://discussions-636e5-default-rtdb.firebaseio.com",
projectId: "discussions-636e5",
storageBucket: "discussions-636e5.firebasestorage.app",
messagingSenderId: "3981476762",
appId: "1:3981476762:web:b3cb0f505367758a52b023",
measurementId: "G-FB1S4XN3GS"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const profilePic = document.getElementById("profilePic");
const nameEl = document.getElementById("name");
const emailEl = document.getElementById("email");
const clubEl = document.getElementById("club");
const logoutBtn = document.getElementById("logoutBtn");

auth.onAuthStateChanged(async (user) => {

if (!user) {
window.location.href = "index.html";
return;
}

try {

const snapshot = await db.ref("users-register/" + user.uid).once("value");
const data = snapshot.val();

if (data) {

nameEl.textContent = data.name || "No Name";
emailEl.textContent = data.email || user.email;
clubEl.textContent = data.favoriteTeam || "No Club Selected";
profilePic.src = data.photoURL || user.photoURL || "https://via.placeholder.com/150";

} else {

nameEl.textContent = user.displayName || "No Name";
emailEl.textContent = user.email;
clubEl.textContent = "No Club Selected";
profilePic.src = user.photoURL || "https://via.placeholder.com/150";

}

} catch (err) {
console.error(err);
}

});

logoutBtn.addEventListener("click", async () => {

await auth.signOut();
window.location.href = "index.html";

});

</script>

</body>
</html>
