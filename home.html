<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Football Hub Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#f3f4f6;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:#111827;
color:#fff;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
}

.left{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.left img{
width:38px;
height:38px;
border-radius:50%;
border:2px solid #4f46e5;
object-fit:cover;
}

.tabs{
display:flex;
gap:8px;
}

.tab{
padding:6px 10px;
border-radius:10px;
cursor:pointer;
font-size:13px;
background:rgba(255,255,255,0.1);
}

.tab.active{
background:#4f46e5;
}

/* CHAT */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

/* MESSAGE */
.msg{
max-width:75%;
background:#fff;
padding:10px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,.05);
cursor:pointer;
position:relative;
}

.msg.me{
align-self:flex-end;
background:#4f46e5;
color:#fff;
}

.msg-header{
display:flex;
align-items:center;
gap:6px;
margin-bottom:5px;
}

.msg-header img{
width:20px;
height:20px;
border-radius:50%;
}

.meta{
font-size:11px;
opacity:.7;
display:flex;
justify-content:space-between;
margin-top:5px;
}

/* INPUT */
.input-box{
display:flex;
gap:10px;
padding:10px;
background:#fff;
border-top:1px solid #e5e7eb;
}

input{
flex:1;
padding:10px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

button{
background:#111827;
color:#fff;
border:none;
padding:10px 12px;
border-radius:10px;
cursor:pointer;
}

/* REACTIONS POPUP */
.react-box{
position:absolute;
bottom:-40px;
left:10px;
background:#fff;
padding:5px 8px;
border-radius:12px;
display:none;
gap:8px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.react-box span{
cursor:pointer;
font-size:18px;
}

/* PROFILE MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:12px;
width:300px;
text-align:center;
}

.modal-content img{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:10px;
}

/* MOBILE */
@media(max-width:768px){
.tab{font-size:12px;}
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<div class="left" onclick="openProfile()">
<img id="profilePic">
<div>
<div id="name"></div>
<small id="email" style="opacity:.7"></small>
</div>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('general',this)">General</div>
<div class="tab" onclick="switchTab('team',this)">Team</div>
<div class="tab" onclick="switchTab('players',this)">Players</div>
</div>

<button onclick="logout()"><i class="fa fa-right-from-bracket"></i></button>

</div>

<!-- CHAT -->
<div class="chat">

<div class="messages" id="messages"></div>

<div class="input-box">
<input id="msgInput" placeholder="Type message...">
<button onclick="sendMsg()"><i class="fa fa-paper-plane"></i></button>
</div>

</div>

<!-- PROFILE MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="mPic">
<h3 id="mName"></h3>
<p id="mEmail"></p>
<p id="mClub"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyC9tqDdyuIbdgWIBcwwGB7uax0ci_AlrSE",
authDomain:"discussions-636e5.firebaseapp.com",
databaseURL:"https://discussions-636e5-default-rtdb.firebaseio.com"
});

const auth=firebase.auth();
const db=firebase.database();

let user,data,tab="general";

const msgBox=document.getElementById("messages");

auth.onAuthStateChanged(async u=>{

if(!u)location="index.html";

user=u;

let s=await db.ref("users-register/"+u.uid).once("value");
data=s.val();

document.getElementById("name").innerText=data.name;
document.getElementById("email").innerText=data.email;
document.getElementById("profilePic").src=data.photoURL;

listen();

});

/* ROOM */
function roomPath(){
if(tab==="general")return "chats/general/messages";
if(tab==="team")return "chats/team/"+data.favoriteTeam+"/messages";
return "players";
}

/* TAB SWITCH */
function switchTab(t,el){
tab=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
msgBox.innerHTML="";

if(tab==="players")loadPlayers();
else listen();
}

/* LISTEN */
function listen(){
db.ref(roomPath()).off();
db.ref(roomPath()).on("child_added",s=>{
render(s.val(),s.key);
});
}

/* MESSAGE */
function render(m,k){

let div=document.createElement("div");
div.className="msg "+(m.uid===user.uid?"me":"");

let reactBox=document.createElement("div");
reactBox.className="react-box";
reactBox.innerHTML=`
<span onclick="react('${k}','❤️')">❤️</span>
<span onclick="react('${k}','👍')">👍</span>
<span onclick="react('${k}','😂')">😂</span>
<span onclick="react('${k}','😡')">😡</span>
`;

div.innerHTML=`
<div class="msg-header">
<img src="${m.photo}">
<strong>${m.name}</strong>
</div>
<div>${m.text}</div>
<div class="meta">
<span>${m.time}</span>
<span>${(m.reactions||[]).length}</span>
</div>
`;

div.appendChild(reactBox);

/* SHOW REACTIONS ONLY ON HOLD/TAP */
div.addEventListener("click",()=>{
reactBox.style.display=
reactBox.style.display==="flex"?"none":"flex";
});

msgBox.appendChild(div);
msgBox.scrollTop=msgBox.scrollHeight;

}

/* SEND */
function sendMsg(){

let text=document.getElementById("msgInput").value;
if(!text)return;

db.ref(roomPath()).push({
uid:user.uid,
name:data.name,
photo:data.photoURL,
text,
time:new Date().toLocaleTimeString(),
reactions:[]
});

document.getElementById("msgInput").value="";

}

/* REACTION */
function react(id,r){

db.ref(roomPath()+"/"+id).once("value",s=>{
let m=s.val();
m.reactions=m.reactions||[];
m.reactions.push(r);
db.ref(roomPath()+"/"+id).update({reactions:m.reactions});
});

}

/* WIKIPEDIA PLAYERS */
async function loadPlayers(){

msgBox.innerHTML="Loading players...";

let url=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(data.favoriteTeam+" squad")}`;

let res=await fetch(url);
let d=await res.json();

msgBox.innerHTML=`
<div style="text-align:center">
<img src="${d.thumbnail?.source||''}" style="width:100px;border-radius:50%">
<h3>${d.title}</h3>
<p>${d.extract||''}</p>
</div>
`;

}

/* PROFILE */
function openProfile(){

document.getElementById("modal").style.display="flex";
document.getElementById("mPic").src=data.photoURL;
document.getElementById("mName").innerText=data.name;
document.getElementById("mEmail").innerText=data.email;
document.getElementById("mClub").innerText=data.favoriteTeam;

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* LOGOUT */
function logout(){
auth.signOut();
location="index.html";
}

</script>

</body>
</html>
