<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Football Hub Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#f3f4f6;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:#111827;
color:#fff;
padding:12px 14px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.user{
display:flex;
align-items:center;
gap:10px;
}

.user img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid #4f46e5;
}

.user-info small{
font-size:12px;
opacity:.7;
}

.club-tag{
background:#4f46e5;
padding:2px 8px;
border-radius:10px;
font-size:12px;
margin-left:6px;
}

/* LAYOUT */
.container{
flex:1;
display:flex;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:280px;
background:#fff;
border-right:1px solid #e5e7eb;
padding:10px;
overflow:auto;
}

.room{
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:8px;
display:flex;
justify-content:space-between;
}

.room.active{
background:#eef2ff;
color:#4f46e5;
font-weight:600;
}

/* PLAYERS LIST */
.players{
margin-top:15px;
border-top:1px solid #eee;
padding-top:10px;
}

.player{
display:flex;
gap:10px;
align-items:center;
padding:8px;
border-radius:10px;
}

.player img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
background:#eee;
}

/* CHAT */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:12px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
background:#fff;
padding:10px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,.05);
cursor:pointer;
}

.msg.me{
align-self:flex-end;
background:#4f46e5;
color:#fff;
}

.msg-header{
display:flex;
align-items:center;
gap:8px;
margin-bottom:5px;
}

.msg-header img{
width:22px;
height:22px;
border-radius:50%;
}

.meta{
font-size:11px;
opacity:.7;
display:flex;
justify-content:space-between;
margin-top:5px;
}

/* INPUT */
.input-box{
display:flex;
gap:10px;
padding:10px;
background:#fff;
border-top:1px solid #e5e7eb;
}

input{
flex:1;
padding:10px;
border:1px solid #e5e7eb;
border-radius:10px;
outline:none;
}

button{
background:#111827;
color:#fff;
border:none;
padding:10px 12px;
border-radius:10px;
cursor:pointer;
}

/* REACTIONS */
.reactions{
display:flex;
gap:8px;
margin-top:6px;
font-size:16px;
}

.react{
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{
display:none;
}
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
padding:15px;
border-radius:12px;
display:none;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

</style>
</head>

<body>

<div class="header">

<div class="user">
<img id="profilePic">
<div>
<div>
<span id="name"></span>
<span class="club-tag" id="clubTag"></span>
</div>
<small id="email"></small>
</div>
</div>

<div><i class="fa fa-users"></i> <span id="online">0</span></div>

<button onclick="logout()">Logout</button>

</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="room active" onclick="switchRoom(event,'general')">General</div>
<div class="room" onclick="switchRoom(event,'team')">Team Chat</div>

<div class="players">
<h4>Players</h4>
<div id="playersList"></div>
</div>

</div>

<!-- CHAT -->
<div class="chat">

<div class="messages" id="messages"></div>

<div class="input-box">
<input id="msgInput" placeholder="Type message...">
<button onclick="sendMsg()"><i class="fa fa-paper-plane"></i></button>
</div>

</div>

</div>

<div class="popup" id="popup"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
apiKey: "AIzaSyC9tqDdyuIbdgWIBcwwGB7uax0ci_AlrSE",
authDomain: "discussions-636e5.firebaseapp.com",
databaseURL: "https://discussions-636e5-default-rtdb.firebaseio.com",
projectId: "discussions-636e5",
storageBucket: "discussions-636e5.firebasestorage.app",
messagingSenderId: "3981476762",
appId: "1:3981476762:web:b3cb0f505367758a52b023",
measurementId: "G-FB1S4XN3GS"
});

const auth = firebase.auth();
const db = firebase.database();

let user, data, room="general";

const msgBox=document.getElementById("messages");

auth.onAuthStateChanged(async u=>{

if(!u)location="index.html";

user=u;

let snap=await db.ref("users-register/"+u.uid).once("value");
data=snap.val();

document.getElementById("name").innerText=data.name;
document.getElementById("email").innerText=data.email;
document.getElementById("clubTag").innerText=data.favoriteTeam;
document.getElementById("profilePic").src=data.photoURL;

loadPlayers(data.favoriteTeam);
listen();

});

function roomPath(){
return room==="general"
?"chats/general/messages"
:"chats/team/"+data.favoriteTeam+"/messages";
}

function switchRoom(e,r){
room=r;
document.querySelectorAll(".room").forEach(x=>x.classList.remove("active"));
e.target.classList.add("active");
msgBox.innerHTML="";
listen();
}

function listen(){
db.ref(roomPath()).off();
db.ref(roomPath()).on("child_added",s=>{
render(s.val(),s.key);
});
}

function render(m,k){

let div=document.createElement("div");
div.className="msg "+(m.uid===user.uid?"me":"");

div.innerHTML=`
<div class="msg-header">
<img src="${m.photo}">
<strong>${m.name}</strong>
</div>
<div>${m.text}</div>

<div class="reactions">
<span class="react" onclick="react('${k}','❤️')">❤️</span>
<span class="react" onclick="react('${k}','👍')">👍</span>
<span class="react" onclick="react('${k}','😂')">😂</span>
<span class="react" onclick="react('${k}','😡')">😡</span>
</div>

<div class="meta">
<span>${m.time}</span>
<span>${(m.reactions||[]).length}</span>
</div>
`;

msgBox.appendChild(div);
msgBox.scrollTop=msgBox.scrollHeight;
}

function sendMsg(){

let text=document.getElementById("msgInput").value;
if(!text)return;

db.ref(roomPath()).push({
uid:user.uid,
name:data.name,
photo:data.photoURL,
text,
time:new Date().toLocaleTimeString(),
reactions:[]
});

document.getElementById("msgInput").value="";
}

function react(id,type){

db.ref(roomPath()+"/"+id).once("value",s=>{

let m=s.val();
m.reactions=m.reactions||[];
m.reactions.push(type);

db.ref(roomPath()+"/"+id).update({reactions:m.reactions});

});

}

/* Wikipedia Players */
async function loadPlayers(team){

let url=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(team+" football players")}`;

try{
let res=await fetch(url);
let d=await res.json();

document.getElementById("playersList").innerHTML=
`
<div class="player">
<img src="${d.thumbnail?.source || ''}">
<div>${d.title}</div>
</div>
`;

}catch(e){
console.log(e);
}

}

function logout(){
auth.signOut();
location="index.html";
}

</script>

</body>
</html>
